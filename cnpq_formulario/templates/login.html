<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Monitoramento INCT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }
    </style>
</head>
<body>
    <div class="container my-5" style="max-width: 750px;">

        <div class="card shadow-sm border-0 border-top border-4 border-primary mb-5">
            <div class="card-body p-4">
                <div class="row align-items-center">
                    
                    <div class="col-md-8 text-center text-md-start mb-3 mb-md-0">
                        <h1 class="fw-bolder text-dark mb-2" style="font-size: 1.8rem; letter-spacing: -0.5px;">
                            Formulário de Monitoramento dos INCTs
                        </h1>
                        <p class="text-dark mb-0 fw-semibold" style="font-size: 0.95rem;">
                            Conselho Nacional de Desenvolvimento Científico e Tecnológico
                        </p>
                    </div>
                    
                    <div class="col-md-4 text-center text-md-end">
                        <img src="{{ url_for('static', filename='logo_cnpq.png') }}" alt="Logo CNPq" class="img-fluid" style="max-height: 70px;" />
                    </div>
                    
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
            
            <div class="card-header py-4 text-center border-0" style="background-color: #f0f7ff; border-bottom: 3px solid #0d6efd !important;">
                <h4 class="mb-0 text-dark fw-bolder">
                    <i class="fas fa-sign-in-alt text-primary me-2"></i>Acesso ao Sistema
                </h4>
            </div>
            
            <div class="card-body p-4 p-lg-5">
                
                {% if erro %}
                    <div class="alert alert-danger text-center shadow-sm fw-bold mb-4">{{ erro }}</div>
                {% endif %}
                {% if mensagem %}
                    <div class="alert alert-success text-center shadow-sm fw-bold mb-4">{{ mensagem }}</div>
                {% endif %}

                <form method="POST" novalidate>
                    
                    <div class="mb-4">
                        <label for="cpf" class="form-label fw-bold text-dark small text-uppercase" style="letter-spacing: 0.5px;">CPF do Coordenador(a)</label>
                        <div class="input-group input-group-lg shadow-sm">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-dark fa-fw"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0 text-dark fw-semibold" id="cpf" name="cpf" placeholder="Digite seu CPF" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-5">
                        <label for="senha" class="form-label fw-bold text-dark small text-uppercase" style="letter-spacing: 0.5px;">Senha</label>
                        <div class="input-group input-group-lg shadow-sm">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-dark fa-fw"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0 text-dark fw-semibold" id="senha" name="senha" placeholder="Digite sua senha" required>
                        </div>
                    </div>

                    <div class="d-grid mt-2">
                        <button type="submit" class="btn btn-primary btn-lg py-3 shadow-sm" style="border-radius: 8px; font-weight: 700; font-size: 1.15rem;"
                                onclick="if(document.querySelector('form').checkValidity()) { mostrarLoading('Autenticando...'); }">
                            Entrar no Sistema
                        </button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="d-none position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center" 
         style="z-index: 9999; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px);">
        
        <div class="bg-white p-4 p-md-5 rounded-4 shadow-lg text-center d-flex flex-column align-items-center" 
             style="min-width: 320px; transform: scale(1.05);">
            <div class="spinner-border text-primary mb-4" role="status" style="width: 3.5rem; height: 3.5rem; border-width: 0.3rem;"></div>
            <h5 class="text-dark fw-bold m-0" id="loadingText">Autenticando...</h5>
            <p class="text-dark mt-2 mb-0" style="font-size: 0.95rem;">Aguarde um momento.</p>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
